# ============================================================
# docker-compose.yml — Base commune (dev & prod)
# ============================================================
# Usage DEV  : docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
# Usage PROD : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# ============================================================

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-sharkbot}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - shark-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shark} -d ${POSTGRES_DB:-sharkbot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Bot Discord + API Backend ───────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-shark}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-sharkbot}?schema=public
      DISCORD_TOKEN: ${DISCORD_TOKEN:?DISCORD_TOKEN is required}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:?DISCORD_CLIENT_ID is required}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:?DISCORD_CLIENT_SECRET is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      API_URL: ${API_URL:-http://localhost:3001}
      DASHBOARD_URL: ${DASHBOARD_URL:-http://localhost:3000}
      API_PORT: 3001
    networks:
      - shark-net

  # ── Dashboard Next.js ───────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    depends_on:
      - bot
    environment:
      API_URL: http://bot:3001
    networks:
      - shark-net

volumes:
  db-data:

networks:
  shark-net:
    driver: bridge
