services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
      POSTGRES_DB: discordbot
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - shark-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U bot -d discordbot" ]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bot:bot@db:5432/discordbot?schema=public
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      API_URL: ${API_URL:-http://localhost:3001}
      DASHBOARD_URL: ${DASHBOARD_URL:-http://localhost:3000}
      API_PORT: 3001
      NODE_ENV: production
    networks:
      - shark-net
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    depends_on:
      - bot
    environment:
      API_URL: http://bot:3001
    networks:
      - shark-net
      - coolify
    restart: unless-stopped

volumes:
  db-data:


networks:
  shark-net:
    driver: bridge
  coolify:
    external: true
